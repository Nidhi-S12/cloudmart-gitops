apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: cloudmart/order-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: redis-host
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: kafka-brokers
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
