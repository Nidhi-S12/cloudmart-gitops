apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: product-service-secret
  namespace: cloudmart
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: product-service-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: cloudmart/product-service
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: order-service-secret
  namespace: cloudmart
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: order-service-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
