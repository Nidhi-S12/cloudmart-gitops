apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service   # routes traffic to pods with this label
  ports:
    - port: 8000           # port other pods use to call this service
      targetPort: 8000     # port the container is listening on
  type: ClusterIP          # internal only — not reachable from outside the cluster
