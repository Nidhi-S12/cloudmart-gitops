apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tulunad-click-tls
  namespace: cloudmart
spec:
  secretName: tulunad-click-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - tulunad.click
    - argocd.tulunad.click
    - grafana.tulunad.click
    - traefik.tulunad.click
