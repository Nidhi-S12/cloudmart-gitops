# Lean resource limits for local dev cluster
# Production would have higher limits and persistent storage

grafana:
  enabled: true
  adminPassword: cloudmart123
  grafana.ini:
    server:
      root_url: https://grafana.tulunad.click
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
  persistence:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        memory: 256Mi
        cpu: 200m
      limits:
        memory: 512Mi
        cpu: 500m
    storageSpec: {}

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m

# Disable heavy components we don't need locally
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

# Node exporter — lightweight, keep it
nodeExporter:
  enabled: true

# kube-state-metrics — lightweight, keep it
kubeStateMetrics:
  enabled: true

prometheusOperator:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
