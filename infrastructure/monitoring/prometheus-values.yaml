# Lean resource limits for local dev cluster
# Production would have higher limits and persistent storage

grafana:
  enabled: true
  adminPassword: cloudmart123
  grafana.ini:
    server:
      root_url: https://grafana.tulunad.click
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
  persistence:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        memory: 256Mi
        cpu: 200m
      limits:
        memory: 512Mi
        cpu: 500m
    storageSpec: {}

alertmanager:
  # Route all alerts through SNS → email
  # __SNS_TOPIC_ARN__ and __AWS_REGION__ are substituted by setup.sh at apply time
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: email-via-sns
    receivers:
      - name: email-via-sns
        sns_configs:
          - topic_arn: __SNS_TOPIC_ARN__
            sigv4:
              region: __AWS_REGION__
            subject: '[CloudMart] {{ .CommonLabels.alertname }} ({{ .Status }})'
            message: |
              {{ range .Alerts }}
              Alert:       {{ .Labels.alertname }}
              Severity:    {{ .Labels.severity }}
              Namespace:   {{ .Labels.namespace }}
              Pod:         {{ .Labels.pod }}
              Description: {{ .Annotations.description }}
              Summary:     {{ .Annotations.summary }}
              Started:     {{ .StartsAt }}
              {{ end }}
  # IRSA — AlertManager ServiceAccount needs sns:Publish
  serviceAccount:
    create: true
    name: alertmanager
    annotations:
      eks.amazonaws.com/role-arn: __ALERTMANAGER_ROLE_ARN__
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m

# Disable heavy components we don't need locally
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

# Node exporter — lightweight, keep it
nodeExporter:
  enabled: true

# kube-state-metrics — lightweight, keep it
kubeStateMetrics:
  enabled: true

prometheusOperator:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
