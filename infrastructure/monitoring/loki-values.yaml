# Single binary mode — lightweight for local dev
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: false
  extraVolumes:
    - name: loki-data
      emptyDir: {}
  extraVolumeMounts:
    - name: loki-data
      mountPath: /var/loki
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# Disable components not needed locally
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Promtail is installed as a separate chart (grafana/promtail)
# Newer Loki chart versions don't bundle it
promtail:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

grafana:
  enabled: false  # already installed via kube-prometheus-stack
